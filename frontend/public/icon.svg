<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB980"/>
      <stop offset="100%" stop-color="#FF8C42"/>
    </linearGradient>
    <linearGradient id="bell-l" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF8F2"/>
      <stop offset="100%" stop-color="#FFE6CC"/>
    </linearGradient>
    <linearGradient id="bell-r" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF0E5"/>
      <stop offset="100%" stop-color="#FFD0A8"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="512" height="512" rx="115" fill="url(#bg)"/>

  <!-- Subtle highlight -->
  <ellipse cx="180" cy="120" rx="120" ry="60" fill="#FFFFFF" opacity="0.18"/>

  <!-- Dumbbell bar -->
  <rect x="160" y="240" width="192" height="36" rx="18" fill="url(#bell-l)"/>

  <!-- Left bell (outer) -->
  <rect x="60" y="170" width="100" height="176" rx="44" fill="url(#bell-l)"/>
  <!-- Left bell (inner) -->
  <rect x="120" y="200" width="60" height="116" rx="24" fill="url(#bell-l)" opacity="0.95"/>

  <!-- Right bell (outer) -->
  <rect x="352" y="170" width="100" height="176" rx="44" fill="url(#bell-r)"/>
  <!-- Right bell (inner) -->
  <rect x="332" y="200" width="60" height="116" rx="24" fill="url(#bell-r)" opacity="0.95"/>

  <!-- Sweet sparkle accents -->
  <circle cx="100" cy="100" r="6" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="410" cy="115" r="4" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="420" cy="380" r="5" fill="#FFFFFF" opacity="0.7"/>
</svg>
